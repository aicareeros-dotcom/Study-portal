<!DOCTYPE html>
<html>
<head>
  <title>Study Portal</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- Lottie Animation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.9.6/lottie.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    /* Glass card */
    .box {
      width: 320px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    /* Animation */
    #anim {
      width: 120px;
      margin: auto;
    }

    .logo {
      font-family: 'Pacifico', cursive;
      font-size: 30px;
      margin-top: 10px;
    }

    /* Progress bar */
    .progress {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      animation: load 3s linear forwards;
    }

    @keyframes load {
      from { width: 0%; }
      to { width: 100%; }
    }

    .credit {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }

    .credit span {
      color: #00c6ff;
      font-weight: bold;
    }

  </style>
</head>

<body>

<div class="box">

  <!-- Lottie Animation -->
  <div id="anim"></div>

  <div class="logo">Study Portal</div>

  <div class="progress">
    <div class="bar"></div>
  </div>

  <div class="credit">Powered by <span>Ghunawat</span> ⚡</div>

</div>

<script>
  // Lottie animation load
  lottie.loadAnimation({
    container: document.getElementById("anim"),
    renderer: "svg",
    loop: true,
    autoplay: true,
    path: "https://assets10.lottiefiles.com/packages/lf20_usmfx6bp.json"
  });
</script>

<!-- Firebase Redirect -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9jDwVKcJQz_51XEmeOAWlq7cJnU5cac4",
  authDomain: "studyhub-db6e6.firebaseapp.com",
  projectId: "studyhub-db6e6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Smooth redirect
setTimeout(() => {
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "dashboard.html";
    } else {
      window.location.href = "login.html";
    }
  });
}, 3000);
</script>

</body>
</html>
