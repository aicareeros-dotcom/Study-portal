<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.9.6/lottie.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; justify-content: center; align-items: center; overflow: hidden; color: white; }
    .box { width: 90%; max-width: 320px; padding: 30px; border-radius: 20px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    #anim { width: 120px; margin: auto; }
    .logo { font-family: 'Pacifico', cursive; font-size: 28px; margin-top: 15px; background: linear-gradient(90deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .progress { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 25px; overflow: hidden; }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00c6ff, #0072ff); animation: load 3s linear forwards; }
    @keyframes load { from { width: 0%; } to { width: 100%; } }
  </style>
</head>
<body>
<div class="box">
  <div id="anim"></div>
  <div class="logo">Study Portal</div>
  <div class="progress"><div class="bar"></div></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9JDWVKcJQz_51XEme0AWlq7cjnU5cac4",
  authDomain: "studyhub-db6e6.firebaseapp.com",
  projectId: "studyhub-db6e6"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

lottie.loadAnimation({
    container: document.getElementById("anim"),
    renderer: "svg", loop: true, autoplay: true,
    path: "https://assets10.lottiefiles.com/packages/lf20_usmfx6bp.json"
});

setTimeout(() => {
  onAuthStateChanged(auth, (user) => {
    window.location.href = user ? "dashboard.html" : "login.html";
  });
}, 3500);
</script>
</body>
</html>
