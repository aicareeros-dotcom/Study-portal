<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dashboard - Study Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { min-height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 10px; }
    .logo { font-family: 'Pacifico', cursive; font-size: 24px; color: #00c6ff; }
    .container { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-top: 20px; }
    .card { width: 100%; max-width: 350px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; text-align: center; transition: 0.3s; cursor: pointer; }
    .card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.12); }
    .card h3 { font-size: 22px; margin-bottom: 10px; color: #00c6ff; }
    .card p { font-size: 13px; opacity: 0.7; margin-bottom: 20px; }
    .btn { display: inline-block; padding: 12px 30px; background: linear-gradient(90deg, #00c6ff, #0072ff); border-radius: 50px; text-decoration: none; color: white; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(0, 198, 255, 0.3); }
    .logout-btn { background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.3); padding: 8px 15px; border-radius: 12px; color: #ff4d4d; font-size: 12px; cursor: pointer; font-weight: 600; }
    @media (min-width: 768px) { .container { flex-direction: row; justify-content: center; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Study Portal</div>
  <button class="logout-btn" id="logoutBtn">Logout</button>
</header>

<div style="text-align: center; margin-bottom: 40px; padding: 0 10px;">
  <h1 id="welcomeText" style="font-size: 24px;">Checking Session... ✨</h1>
  <p style="opacity: 0.6; font-size: 14px; margin-top: 5px;">Select your learning platform</p>
</div>

<div class="container">
  <div class="card" onclick="window.open('https://www.pw.live/', '_blank')">
    <h3>Physics Wallah</h3>
    <p>Prepare for your exams with India's most loved educational platform.</p>
    <span class="btn">Start Learning</span>
  </div>

  <div class="card" onclick="window.open('https://www.nexttopper.in/', '_blank')">
    <h3>Next Topper</h3>
    <p>Boost your scores with advanced practice and topper strategies.</p>
    <span class="btn">Explore Now</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9JDWVKcJQz_51XEme0AWlq7cjnU5cac4",
  authDomain: "studyhub-db6e6.firebaseapp.com",
  projectId: "studyhub-db6e6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Auth check logic
onAuthStateChanged(auth, (user) => {
  if (user) {
    const name = user.displayName || "Student";
    document.getElementById("welcomeText").innerText = "Welcome, " + name + " ✨";
  } else {
    // Agar login session nahi mila toh 1.5 second wait karke bhejega
    setTimeout(() => {
        if (!auth.currentUser) {
            window.location.href = "login.html";
        }
    }, 1500);
  }
});

// Logout logic
document.getElementById("logoutBtn").addEventListener("click", () => {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
});
</script>

</body>
</html>
