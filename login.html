<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Study Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; justify-content: center; align-items: center; color: white; }
    .box { width: 90%; max-width: 330px; padding: 30px; border-radius: 20px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
    .logo { font-family: 'Pacifico', cursive; font-size: 32px; color: #00c6ff; margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.15); color: white; outline: none; }
    button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(90deg, #00c6ff, #0072ff); color: white; font-weight: 600; cursor: pointer; margin-top: 15px; }
    .link { margin-top: 15px; font-size: 13px; color: #00c6ff; cursor: pointer; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo">Study Portal</div>
  <input id="email" type="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <div class="link" onclick="location.href='register.html'">New user? Register</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9JDWVKcJQz_51XEme0AWlq7cjnU5cac4",
  authDomain: "studyhub-db6e6.firebaseapp.com",
  projectId: "studyhub-db6e6"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", () => {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;
  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = "dashboard.html")
    .catch(err => alert("Login Error: " + err.message));
});
</script>
</body>
</html>
