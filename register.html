<!DOCTYPE html>
<html>
<head>
  <title>Register - Study Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { height: 100vh; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); display: flex; justify-content: center; align-items: center; color: white; }
    .box { width: 330px; padding: 25px; border-radius: 20px; background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .logo { font-family: 'Pacifico', cursive; font-size: 30px; margin-bottom: 10px; }
    h2 { margin-bottom: 15px; font-weight: 500; }
    input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; outline: none; background: rgba(255,255,255,0.1); color: white; }
    input::placeholder { color: rgba(255,255,255,0.5); }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(90deg, #00c6ff, #0072ff); color: white; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .link { margin-top: 15px; font-size: 14px; cursor: pointer; color: #00c6ff; text-decoration: none; display: block; }
    .credit { margin-top: 15px; font-size: 12px; opacity: 0.7; }
    .credit span { color: #00c6ff; font-weight: bold; }
  </style>
</head>
<body>

<div class="box">
  <div class="logo">Study Portal</div>
  <h2>Create Account ✨</h2>

  <input id="userName" type="text" placeholder="Enter Full Name">
  <input id="email" type="email" placeholder="Enter Email">
  <input id="pass" type="password" placeholder="Create Password">

  <button id="regBtn">Sign Up</button>
  
  <div class="link" id="loginLink">Already have an account? Login</div>
  <div class="credit">Powered by <span>Ghunawat</span> ⚡</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, updateProfile } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// Config fix: Capital 'J' used here
const firebaseConfig = {
  apiKey: "AIzaSyD9JDWVKcJQz_51XEme0AWlq7cjnU5cac4",
  authDomain: "studyhub-db6e6.firebaseapp.com",
  projectId: "studyhub-db6e6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Register Functionality
document.getElementById("regBtn").addEventListener("click", () => {
  const name = document.getElementById("userName").value;
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  if (!name || !email || !pass) {
    alert("Saari details bhariye!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, pass)
    .then((userCredential) => {
      updateProfile(userCredential.user, {
        displayName: name
      }).then(() => {
        alert("Account ban gaya! Welcome " + name);
        window.location.href = "dashboard.html";
      });
    })
    .catch((err) => alert(err.message));
});

// Redirect to Login
document.getElementById("loginLink").addEventListener("click", () => {
  window.location.href = "login.html";
});
</script>

</body>
</html>
